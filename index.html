<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Fórmula APK Chat V5 - Moderno</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --primary: #00875f;
    --primary-dark: #006b48;
    --primary-light: #25d366;
    --background: #f0f2f5;
    --surface: #ffffff;
    --text: #111b21;
    --text-light: #667781;
    --border: #e2e8f0;
    --sent-bubble: #d9fdd3;
    --received-bubble: #ffffff;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
    --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
    --transition: all 0.2s ease;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--background);
    color: var(--text);
    transition: var(--transition);
  }

  body.dark {
    --background: #0a1014;
    --surface: #1e2a32;
    --text: #e9edef;
    --text-light: #8696a0;
    --border: #2a3942;
    --sent-bubble: #005c4b;
    --received-bubble: #202c33;
  }

  ::-webkit-scrollbar {
    width: 6px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 10px;
  }

  body.dark ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
  }

  /* Login Screen */
  .login-screen {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: linear-gradient(145deg, var(--primary) 0%, var(--primary-dark) 100%);
  }

  .login-card {
    background: var(--surface);
    width: 100%;
    max-width: 400px;
    padding: 40px 32px;
    border-radius: 36px;
    text-align: center;
    box-shadow: var(--shadow-lg);
    animation: fadeInUp 0.5s ease;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .login-card h1 {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    font-size: 32px;
    margin-bottom: 8px;
    font-weight: 800;
  }

  .login-card .subtitle {
    color: var(--text-light);
    font-size: 13px;
    margin-bottom: 28px;
  }

  .login-card input {
    width: 100%;
    padding: 14px 18px;
    border-radius: 16px;
    border: 1.5px solid var(--border);
    margin: 8px 0;
    font-size: 15px;
    background: var(--surface);
    color: var(--text);
    transition: var(--transition);
  }

  .login-card input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(0, 135, 95, 0.15);
  }

  .enter-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    font-weight: 600;
    border-radius: 16px;
    font-size: 16px;
    margin-top: 20px;
    cursor: pointer;
    transition: var(--transition);
    border: none;
  }

  .enter-btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .error-msg {
    color: #ff4d4d;
    font-size: 12px;
    margin-top: 12px;
    display: none;
  }

  /* Chat Screen */
  .chat-screen {
    display: none;
    height: 100vh;
    flex-direction: column;
    background: var(--background);
  }

  .chat-header {
    background: var(--surface);
    display: flex;
    align-items: center;
    padding: 12px 20px;
    gap: 14px;
    box-shadow: var(--shadow-sm);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .avatar {
    width: 48px;
    height: 48px;
    min-width: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 18px;
    overflow: hidden;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .header-info {
    flex: 1;
  }

  .header-title {
    font-weight: 700;
    font-size: 18px;
  }

  .header-status {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 4px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    background: transparent;
    color: var(--text);
    font-size: 20px;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
  }

  .icon-btn:hover {
    background: rgba(0, 0, 0, 0.06);
  }

  body.dark .icon-btn:hover {
    background: rgba(255, 255, 255, 0.06);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .message-row {
    display: flex;
    width: 100%;
    margin-bottom: 6px;
    align-items: flex-end;
    gap: 8px;
    animation: messageSlide 0.3s ease;
  }

  @keyframes messageSlide {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .message-row.mine {
    justify-content: flex-end;
  }

  .message-row.other {
    justify-content: flex-start;
  }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  .msg-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .message {
    max-width: 70%;
    min-width: 80px;
    padding: 8px 12px;
    border-radius: 18px;
    position: relative;
    box-shadow: var(--shadow-sm);
  }

  .my-message {
    background: var(--sent-bubble);
    color: var(--text);
    border-bottom-right-radius: 4px;
  }

  .other-message {
    background: var(--received-bubble);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .message-name {
    font-size: 11px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 4px;
  }

  .message-text {
    font-size: 14px;
    line-height: 1.4;
    word-wrap: break-word;
  }

  .message-time {
    font-size: 10px;
    color: var(--text-light);
    margin-top: 4px;
    text-align: right;
  }

  .reply-box {
    background: rgba(0, 0, 0, 0.05);
    border-left: 3px solid var(--primary);
    padding: 6px 10px;
    border-radius: 12px;
    margin-bottom: 6px;
    font-size: 11px;
  }

  .reply-name {
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 2px;
  }

  .reply-text {
    color: var(--text-light);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .message-actions {
    display: none;
    gap: 6px;
    margin-top: 8px;
    justify-content: flex-end;
  }

  .message:hover .message-actions {
    display: flex;
  }

  .action-btn {
    background: rgba(0, 0, 0, 0.08);
    color: var(--primary);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    border: none;
  }

  .delete-btn, .ban-btn {
    background: rgba(255, 77, 77, 0.12);
    color: #ff4d4d;
  }

  .system-message {
    width: fit-content;
    max-width: 80%;
    margin: 8px auto;
    background: rgba(0, 0, 0, 0.05);
    color: var(--text-light);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 11px;
    text-align: center;
  }

  .day-label {
    width: fit-content;
    margin: 16px auto;
    background: rgba(0, 0, 0, 0.05);
    color: var(--text-light);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }

  .typing {
    display: none;
    position: fixed;
    bottom: 80px;
    left: 16px;
    background: var(--surface);
    color: var(--text-light);
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 20px;
    z-index: 6;
    box-shadow: var(--shadow-sm);
  }

  .reply-preview {
    display: none;
    position: fixed;
    bottom: 76px;
    left: 0;
    right: 0;
    background: var(--surface);
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    z-index: 5;
  }

  .reply-preview-content {
    background: var(--surface);
    border-left: 3px solid var(--primary);
    padding: 10px 12px;
    border-radius: 14px;
    font-size: 12px;
    position: relative;
  }

  .cancel-reply {
    position: absolute;
    right: 8px;
    top: 8px;
    background: var(--border);
    border: none;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    font-weight: bold;
    cursor: pointer;
  }

  .input-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    padding: 12px 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    border-top: 1px solid var(--border);
    z-index: 4;
  }

  .input-area input {
    flex: 1;
    border-radius: 25px;
    background: var(--background);
    border: 1px solid var(--border);
    padding: 12px 18px;
    font-size: 15px;
    color: var(--text);
  }

  .input-area input:focus {
    outline: none;
    border-color: var(--primary);
  }

  .send-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
  }

  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    z-index: 20;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-content {
    background: var(--surface);
    width: 100%;
    max-width: 400px;
    border-radius: 28px;
    padding: 28px;
  }

  .modal-content h2 {
    margin-bottom: 20px;
    font-size: 24px;
    font-weight: 700;
  }

  .modal-content h3 {
    margin: 16px 0 12px;
    font-size: 16px;
  }

  .modal-content input {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    margin: 8px 0;
    background: var(--background);
    color: var(--text);
  }

  .modal-content button {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    margin-top: 10px;
    font-weight: 600;
    cursor: pointer;
    border: none;
  }

  .admin-action {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
  }

  .close-btn {
    background: var(--border);
    color: var(--text);
  }

  hr {
    margin: 20px 0;
    border: none;
    height: 1px;
    background: var(--border);
  }

  .connection-status {
    position: fixed;
    bottom: 90px;
    right: 16px;
    background: #ff4d4d;
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 11px;
    z-index: 15;
    display: none;
  }

  @media (max-width: 600px) {
    .message {
      max-width: 85%;
    }
    .message-actions {
      display: flex;
    }
    .action-btn {
      padding: 3px 8px;
      font-size: 9px;
    }
  }
</style>
</head>

<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>✨ Fórmula APK</h1>
    <div class="subtitle">Conecte-se com o mundo</div>
    <input type="text" id="nameInput" placeholder="Seu apelido" />
    <input type="text" id="avatarInput" placeholder="URL da foto (opcional)" />
    <button class="enter-btn" onclick="enterChat()">🚀 ENTRAR NO CHAT</button>
    <div id="loginError" class="error-msg"></div>
  </div>
</div>

<div class="chat-screen" id="chatScreen">
  <div class="chat-header">
    <div class="avatar" id="userAvatar">APK</div>
    <div class="header-info">
      <div class="header-title">Chat Global</div>
      <div class="header-status" id="onlineStatus">● Conectando...</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleTheme()">🌙</button>
      <button class="icon-btn" onclick="openAdmin()">👑</button>
      <button class="icon-btn" onclick="logout()">🚪</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>
  <div class="typing" id="typingBox">✏️ digitando...</div>

  <div class="reply-preview" id="replyPreview">
    <div class="reply-preview-content">
      <button class="cancel-reply" onclick="cancelReply()">×</button>
      <strong id="replyPreviewName"></strong>
      <div id="replyPreviewText"></div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Digite sua mensagem..." maxlength="300" />
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div class="modal" id="adminModal">
  <div class="modal-content">
    <h2>🔐 Admin</h2>
    <input type="password" id="adminPass" placeholder="Senha Admin">
    <button class="admin-action" onclick="loginAdmin()">Entrar como ADM</button>
    <hr>
    <div id="adminTools" style="display: none;">
      <h3>🛠️ Ferramentas</h3>
      <input type="text" id="banNameInput" placeholder="Apelido para banir">
      <button class="admin-action" onclick="banByName()">🚫 Banir apelido</button>
      <button class="admin-action" onclick="clearChat()">🗑️ Limpar chat</button>
    </div>
    <button class="close-btn" onclick="closeAdmin()">Fechar</button>
    <p id="adminStatus" style="font-size:12px; margin-top:12px; text-align:center;"></p>
  </div>
</div>

<div class="connection-status" id="connectionStatus">⚠️ Reconectando...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot,
  limit, deleteDoc, doc, getDocs, updateDoc, setDoc, getDoc, arrayUnion, connectFirestoreEmulator
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyOdEV7GfcOqVCYLlp8LMD_0Y8Y6HTTJg",
  authDomain: "chat-global-665c0.firebaseapp.com",
  projectId: "chat-global-665c0",
  storageBucket: "chat-global-665c0.firebasestorage.app",
  messagingSenderId: "484426308227",
  appId: "1:484426308227:web:6a8f95b90eb61a97d3d9b6"
};

// Inicializar Firebase com tratamento de erro
let app, db;
let firebaseConnected = false;

try {
  app = initializeApp(firebaseConfig);
  db = getFirestore(app);
  firebaseConnected = true;
  console.log("✅ Firebase conectado!");
} catch (error) {
  console.error("❌ Erro ao conectar Firebase:", error);
  firebaseConnected = false;
  document.getElementById("loginError").textContent = "⚠️ Erro de conexão. Recarregue a página.";
  document.getElementById("loginError").style.display = "block";
}

const ADMIN_PASSWORD = "121103";

let isAdmin = false;
let userName = localStorage.getItem("chatName") || "";
let userAvatarUrl = localStorage.getItem("chatAvatar") || "";
let userId = localStorage.getItem("chatUserId") || "user_" + Date.now() + "_" + Math.random().toString(36).substring(2, 12);
let lastMessageTime = 0;
let lastSnapshotSize = 0;
let replyingTo = null;
let typingTimer = null;

localStorage.setItem("chatUserId", userId);

const loginScreen = document.getElementById("loginScreen");
const chatScreen = document.getElementById("chatScreen");
const messagesBox = document.getElementById("messages");
const messageInput = document.getElementById("messageInput");
const onlineStatus = document.getElementById("onlineStatus");
const userAvatar = document.getElementById("userAvatar");
const typingBox = document.getElementById("typingBox");
const replyPreview = document.getElementById("replyPreview");
const replyPreviewName = document.getElementById("replyPreviewName");
const replyPreviewText = document.getElementById("replyPreviewText");
const adminTools = document.getElementById("adminTools");
const adminStatus = document.getElementById("adminStatus");
const connectionStatusDiv = document.getElementById("connectionStatus");

const forbiddenWords = ["palavrão1", "palavrão2", "spam"];

if (localStorage.getItem("theme") === "dark") document.body.classList.add("dark");

// Verificar se já está logado
if (userName && firebaseConnected) {
  startApp();
} else if (userName && !firebaseConnected) {
  document.getElementById("loginError").textContent = "⚠️ Aguardando conexão... Tente novamente em alguns segundos.";
  document.getElementById("loginError").style.display = "block";
}

async function startApp() {
  const banned = await checkBan();
  if (banned) {
    alert("Você está banido deste chat.");
    localStorage.removeItem("chatName");
    location.reload();
    return;
  }

  loginScreen.style.display = "none";
  chatScreen.style.display = "flex";
  setOnlineStatus();
  setAvatar();
  setUserOnline(true);
  listenTyping();
  listenOnlineUsers();
  loadMessages();
}

function cleanText(text) {
  let newText = text;
  forbiddenWords.forEach(word => {
    const regex = new RegExp(word, "gi");
    newText = newText.replace(regex, "***");
  });
  return newText;
}

function normalizeName(name) {
  return name.trim().toLowerCase();
}

async function checkBan() {
  if (!firebaseConnected) return false;
  try {
    const deviceBan = await getDoc(doc(db, "bans", "device_" + userId));
    const nameBan = await getDoc(doc(db, "bans", "name_" + normalizeName(userName)));
    return deviceBan.exists() || nameBan.exists();
  } catch (error) {
    console.error("Erro ao verificar ban:", error);
    return false;
  }
}

function setAvatar() {
  if (userAvatarUrl && userAvatarUrl.startsWith("http")) {
    userAvatar.innerHTML = `<img src="${userAvatarUrl}" alt="avatar" onerror="this.innerHTML='${userName.substring(0,2).toUpperCase()}'">`;
  } else {
    const letters = userName.substring(0, 2).toUpperCase();
    userAvatar.textContent = letters || "👤";
  }
}

function makeAvatar(name, avatar) {
  const av = document.createElement("div");
  av.className = "msg-avatar";

  if (avatar && avatar.startsWith("http")) {
    const img = document.createElement("img");
    img.src = avatar;
    img.onerror = () => { av.textContent = (name || "U").substring(0,2).toUpperCase(); };
    av.appendChild(img);
  } else {
    av.textContent = (name || "U").substring(0,2).toUpperCase();
  }
  return av;
}

function setOnlineStatus() {
  onlineStatus.textContent = `● ${userName}`;
}

async function setUserOnline(status) {
  if (!firebaseConnected || !userName) return;
  try {
    await setDoc(doc(db, "onlineUsers", userId), {
      name: userName,
      avatar: userAvatarUrl,
      online: status,
      lastSeen: serverTimestamp()
    });
  } catch (error) {
    console.error("Erro ao setar online:", error);
  }
}

function listenOnlineUsers() {
  if (!firebaseConnected) return;
  onSnapshot(collection(db, "onlineUsers"), snapshot => {
    let count = 0;
    snapshot.forEach(item => {
      if (item.data().online) count++;
    });
    onlineStatus.textContent = `● ${count} online — ${userName}`;
  }, (error) => {
    console.error("Erro ao ouvir onlineUsers:", error);
    connectionStatusDiv.style.display = "block";
    setTimeout(() => { connectionStatusDiv.style.display = "none"; }, 3000);
  });
}

async function setTyping(isTyping) {
  if (!firebaseConnected || !userName) return;
  try {
    await setDoc(doc(db, "typingUsers", userId), {
      name: userName,
      typing: isTyping,
      updatedAt: serverTimestamp()
    });
  } catch (error) {
    console.error("Erro ao setar typing:", error);
  }
}

function listenTyping() {
  if (!firebaseConnected) return;
  onSnapshot(collection(db, "typingUsers"), snapshot => {
    let typingNames = [];
    snapshot.forEach(item => {
      const data = item.data();
      if (item.id !== userId && data.typing) typingNames.push(data.name);
    });

    if (typingNames.length > 0) {
      typingBox.style.display = "block";
      typingBox.textContent = typingNames[0] + " está digitando...";
    } else {
      typingBox.style.display = "none";
    }
  });
}

window.toggleTheme = function() {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
};

window.enterChat = async function() {
  const name = document.getElementById("nameInput").value.trim();
  const avatar = document.getElementById("avatarInput").value.trim();

  if (!name) {
    document.getElementById("loginError").textContent = "Digite seu apelido!";
    document.getElementById("loginError").style.display = "block";
    return;
  }
  if (name.length < 3) {
    document.getElementById("loginError").textContent = "Mínimo 3 letras!";
    document.getElementById("loginError").style.display = "block";
    return;
  }
  if (name.length > 20) {
    document.getElementById("loginError").textContent = "Máximo 20 caracteres!";
    document.getElementById("loginError").style.display = "block";
    return;
  }

  if (!firebaseConnected) {
    document.getElementById("loginError").textContent = "⚠️ Sem conexão com o servidor. Recarregue a página.";
    document.getElementById("loginError").style.display = "block";
    return;
  }

  userName = name;
  userAvatarUrl = avatar;

  localStorage.setItem("chatName", userName);
  localStorage.setItem("chatAvatar", userAvatarUrl);

  const banned = await checkBan();
  if (banned) {
    alert("Você está banido deste chat.");
    localStorage.removeItem("chatName");
    return;
  }

  try {
    await addDoc(collection(db, "messages"), {
      name: "📢 Sistema",
      text: userName + " entrou no chat.",
      type: "system",
      createdAt: serverTimestamp()
    });
    startApp();
  } catch (error) {
    console.error("Erro ao entrar:", error);
    document.getElementById("loginError").textContent = "⚠️ Erro ao conectar. Tente novamente.";
    document.getElementById("loginError").style.display = "block";
  }
};

window.logout = async function() {
  await setUserOnline(false);
  await setTyping(false);
  localStorage.removeItem("chatName");
  location.reload();
};

window.openAdmin = function() {
  document.getElementById("adminModal").style.display = "flex";
  adminTools.style.display = "none";
  adminStatus.innerHTML = "";
  document.getElementById("adminPass").value = "";
};

window.closeAdmin = function() {
  document.getElementById("adminModal").style.display = "none";
};

window.loginAdmin = function() {
  const pass = document.getElementById("adminPass").value;
  
  if (pass === ADMIN_PASSWORD) {
    isAdmin = true;
    adminTools.style.display = "block";
    adminStatus.innerHTML = "✅ Admin logado!";
    adminStatus.style.color = "#4caf50";
    alert("✅ Modo Admin ativado!");
    loadMessages();
  } else {
    isAdmin = false;
    adminTools.style.display = "none";
    adminStatus.innerHTML = "❌ Senha incorreta!";
    adminStatus.style.color = "#ff4d4d";
    alert("❌ Senha incorreta!");
  }
};

function verificarAdmin() {
  if (!isAdmin) {
    alert("❌ Faça login como admin primeiro!");
    return false;
  }
  return true;
}

window.banByName = async function() {
  if (!verificarAdmin()) return;
  
  const name = document.getElementById("banNameInput").value.trim();
  if (!name) return alert("Digite um apelido.");

  await setDoc(doc(db, "bans", "name_" + normalizeName(name)), {
    type: "name",
    name: name,
    createdAt: serverTimestamp()
  });

  alert("✅ Apelido banido!");
  document.getElementById("banNameInput").value = "";
};

window.banUser = async function(targetName, targetId) {
  if (!verificarAdmin()) return;
  if (!confirm("Banir " + targetName + "?")) return;

  await setDoc(doc(db, "bans", "name_" + normalizeName(targetName)), {
    type: "name",
    name: targetName,
    createdAt: serverTimestamp()
  });

  if (targetId) {
    await setDoc(doc(db, "bans", "device_" + targetId), {
      type: "device",
      userId: targetId,
      name: targetName,
      createdAt: serverTimestamp()
    });
  }
  alert("✅ Usuário banido!");
};

window.clearChat = async function() {
  if (!verificarAdmin()) return;
  if (!confirm("⚠️ Apagar TODAS as mensagens?")) return;

  const q = query(collection(db, "messages"), limit(300));
  const snapshot = await getDocs(q);
  const deletes = [];
  snapshot.forEach(item => deletes.push(deleteDoc(doc(db, "messages", item.id))));
  await Promise.all(deletes);
  alert("✅ Chat limpo!");
};

window.deleteMessage = async function(id) {
  if (!verificarAdmin()) return;
  if (!confirm("Apagar mensagem?")) return;
  await deleteDoc(doc(db, "messages", id));
};

window.editMessage = async function(id, oldText, ownerId) {
  if (ownerId !== userId && !isAdmin) {
    return alert("❌ Só é possível editar suas próprias mensagens!");
  }

  const newText = prompt("Editar mensagem:", oldText);
  if (!newText || !newText.trim()) return;

  await updateDoc(doc(db, "messages", id), {
    text: cleanText(newText.trim()),
    edited: true
  });
};

window.startReply = function(id, name, text) {
  replyingTo = { id, name, text };
  replyPreview.style.display = "block";
  replyPreviewName.textContent = "Respondendo " + name;
  replyPreviewText.textContent = text;
  messageInput.focus();
};

window.cancelReply = function() {
  replyingTo = null;
  replyPreview.style.display = "none";
};

window.sendMessage = async function() {
  const now = Date.now();

  if (now - lastMessageTime < 1500) return alert("Aguarde um pouco.");

  let text = messageInput.value.trim();
  if (!text) return;
  if (text.length > 300) return alert("Mensagem muito grande.");

  const banned = await checkBan();
  if (banned) return alert("Você está banido.");

  text = cleanText(text);
  lastMessageTime = now;

  const messageData = {
    name: userName,
    userId: userId,
    avatar: userAvatarUrl,
    text: text,
    type: "normal",
    edited: false,
    seenBy: [userId],
    createdAt: serverTimestamp()
  };

  if (replyingTo) messageData.replyTo = replyingTo;

  try {
    await addDoc(collection(db, "messages"), messageData);
    messageInput.value = "";
    cancelReply();
    setTyping(false);
  } catch (error) {
    console.error("Erro ao enviar:", error);
    alert("Erro ao enviar mensagem!");
  }
};

async function markSeen(id, msg) {
  if (msg.userId !== userId && (!msg.seenBy || !msg.seenBy.includes(userId))) {
    try {
      await updateDoc(doc(db, "messages", id), {
        seenBy: arrayUnion(userId)
      });
    } catch (error) {
      console.error("Erro ao marcar visto:", error);
    }
  }
}

function playNotification() {
  try {
    const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
    audio.volume = 0.18;
    audio.play();
  } catch(e) {}
}

function loadMessages() {
  if (!firebaseConnected) return;
  
  const q = query(collection(db, "messages"), orderBy("createdAt", "asc"), limit(120));

  onSnapshot(q, snapshot => {
    messagesBox.innerHTML = "";

    const day = document.createElement("div");
    day.className = "day-label";
    day.textContent = "Hoje";
    messagesBox.appendChild(day);

    snapshot.forEach(documentItem => {
      const msg = documentItem.data();
      const id = documentItem.id;

      if (msg.type === "normal") markSeen(id, msg);

      const time = msg.createdAt?.toDate
        ? msg.createdAt.toDate().toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"})
        : "";

      if (msg.type === "system") {
        const sys = document.createElement("div");
        sys.className = "system-message";
        sys.textContent = msg.text || "";
        messagesBox.appendChild(sys);
        return;
      }

      const isMine = msg.userId === userId || msg.name === userName;

      const row = document.createElement("div");
      row.className = isMine ? "message-row mine" : "message-row other";

      if (!isMine) row.appendChild(makeAvatar(msg.name, msg.avatar));

      const div = document.createElement("div");
      div.className = isMine ? "message my-message" : "message other-message";

      const nameDiv = document.createElement("div");
      nameDiv.className = "message-name";
      nameDiv.textContent = msg.name || "Usuário";
      div.appendChild(nameDiv);

      if (msg.replyTo) {
        const replyBox = document.createElement("div");
        replyBox.className = "reply-box";
        const replyName = document.createElement("div");
        replyName.className = "reply-name";
        replyName.textContent = msg.replyTo.name || "Usuário";
        const replyText = document.createElement("div");
        replyText.className = "reply-text";
        replyText.textContent = msg.replyTo.text || "";
        replyBox.appendChild(replyName);
        replyBox.appendChild(replyText);
        div.appendChild(replyBox);
      }

      const textDiv = document.createElement("div");
      textDiv.className = "message-text";
      textDiv.textContent = msg.text || "";

      const seenCount = msg.seenBy ? msg.seenBy.length : 1;
      const status = isMine ? (seenCount > 1 ? "✓✓" : "✓") : "";

      const timeDiv = document.createElement("div");
      timeDiv.className = "message-time";
      timeDiv.innerHTML = time + (msg.edited ? " ✏️" : "") + (status ? " " + status : "");

      const actionsDiv = document.createElement("div");
      actionsDiv.className = "message-actions";

      const replyButton = document.createElement("button");
      replyButton.className = "action-btn";
      replyButton.textContent = "↩ Responder";
      replyButton.onclick = () => startReply(id, msg.name || "Usuário", msg.text || "");
      actionsDiv.appendChild(replyButton);

      if (isAdmin) {
        const editButton = document.createElement("button");
        editButton.className = "action-btn";
        editButton.textContent = "✎ Editar";
        editButton.onclick = () => editMessage(id, msg.text || "", msg.userId);

        const deleteButton = document.createElement("button");
        deleteButton.className = "action-btn delete-btn";
        deleteButton.textContent = "🗑 Apagar";
        deleteButton.onclick = () => deleteMessage(id);

        actionsDiv.appendChild(editButton);
        actionsDiv.appendChild(deleteButton);

        const banButton = document.createElement("button");
        banButton.className = "action-btn ban-btn";
        banButton.textContent = "🚫 Banir";
        banButton.onclick = () => banUser(msg.name || "Usuário", msg.userId);

        actionsDiv.appendChild(banButton);
      } else if (isMine) {
        const editButton = document.createElement("button");
        editButton.className = "action-btn";
        editButton.textContent = "✎ Editar";
        editButton.onclick = () => editMessage(id, msg.text || "", msg.userId);

        const deleteButton = document.createElement("button");
        deleteButton.className = "action-btn delete-btn";
        deleteButton.textContent = "🗑 Apagar";
        deleteButton.onclick = () => deleteMessage(id);

        actionsDiv.appendChild(editButton);
        actionsDiv.appendChild(deleteButton);
      }

      div.appendChild(textDiv);
      div.appendChild(timeDiv);
      div.appendChild(actionsDiv);

      row.appendChild(div);
      messagesBox.appendChild(row);
    });

    if (snapshot.size > lastSnapshotSize && lastSnapshotSize !== 0) {
      playNotification();
    }

    lastSnapshotSize = snapshot.size;
    messagesBox.scrollTop = messagesBox.scrollHeight;
  }, (error) => {
    console.error("Erro ao carregar mensagens:", error);
    connectionStatusDiv.style.display = "block";
    setTimeout(() => { connectionStatusDiv.style.display = "none"; }, 3000);
  });
}

messageInput.addEventListener("input", () => {
  setTyping(true);
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => setTyping(false), 1200);
});

messageInput.addEventListener("keydown", e => {
  if (e.key === "Enter") sendMessage();
});

window.addEventListener("beforeunload", () => {
  setTyping(false);
  setUserOnline(false);
});
</script>

</body>
</html>
