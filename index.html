<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fórmula APK Chat V5</title>

<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#d8dbd5}
body.dark{background:#111;color:#fff}
button{border:none;cursor:pointer}
input{outline:none}

.login-screen{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;width:100%;max-width:390px;padding:30px 22px;border-radius:24px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.12)}
body.dark .login-card{background:#1f1f1f;color:white}
.login-card h1{color:#00856f}
.warning{font-size:13px;color:#666;line-height:1.4}
body.dark .warning{color:#ccc}
.login-card input{width:100%;padding:15px;border-radius:16px;border:1px solid #ddd;margin:8px 0;font-size:15px}
.enter-btn{width:100%;padding:15px;background:#00856f;color:white;font-weight:bold;border-radius:16px;font-size:15px;margin-top:10px}

.chat-screen{display:none;height:100vh;flex-direction:column;background:#efe7dc}
body.dark .chat-screen{background:#0b141a}

.chat-header{height:76px;background:#075e54;color:white;display:flex;align-items:center;padding:10px 12px;gap:10px;box-shadow:0 2px 5px rgba(0,0,0,.2)}
.avatar{width:46px;height:46px;min-width:46px;border-radius:50%;background:#25d366;color:white;display:flex;align-items:center;justify-content:center;font-weight:bold;overflow:hidden;border:2px solid rgba(255,255,255,.35)}
.avatar img{width:100%;height:100%;object-fit:cover}
.header-info{flex:1;overflow:hidden}
.header-title{font-weight:bold}
.live{font-size:12px;color:#d4ffec;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-actions{display:flex;gap:5px}
.small-btn{background:rgba(255,255,255,.16);color:white;font-size:12px;padding:8px 9px;border-radius:10px;font-weight:bold}

.messages{flex:1;overflow-y:auto;padding:10px 8px 150px;display:flex;flex-direction:column;background-image:radial-gradient(rgba(0,0,0,.04) 1px,transparent 1px);background-size:18px 18px}
.day-label{width:fit-content;margin:8px auto 14px;background:rgba(255,255,255,.9);color:#555;padding:6px 12px;border-radius:12px;font-size:12px}
body.dark .day-label{background:#202c33;color:#ccc}
.system-message{width:fit-content;max-width:90%;margin:8px auto;background:#fff4c2;color:#6b5b00;padding:8px 12px;border-radius:12px;font-size:12px;text-align:center}

.message-row{display:flex;width:100%;margin-bottom:6px;align-items:flex-end;gap:5px}
.message-row.mine{justify-content:flex-end}
.message-row.other{justify-content:flex-start}
.msg-avatar{width:26px;height:26px;border-radius:50%;background:#25d366;color:white;font-size:10px;font-weight:bold;display:flex;align-items:center;justify-content:center;overflow:hidden}
.msg-avatar img{width:100%;height:100%;object-fit:cover}

.message{width:fit-content;max-width:78%;min-width:70px;padding:6px 8px 4px;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.18);word-wrap:break-word;position:relative}
.my-message{background:#dcf8c6;border-top-right-radius:2px}
.other-message{background:#fff;border-top-left-radius:2px}
body.dark .my-message{background:#005c4b;color:white}
body.dark .other-message{background:#202c33;color:white}
.my-message::after{content:"";position:absolute;right:-6px;top:0;border-left:7px solid #dcf8c6;border-bottom:7px solid transparent}
.other-message::before{content:"";position:absolute;left:-6px;top:0;border-right:7px solid #fff;border-bottom:7px solid transparent}
body.dark .my-message::after{border-left-color:#005c4b}
body.dark .other-message::before{border-right-color:#202c33}

.name{font-size:12px;color:#c96b00;font-weight:bold;margin-bottom:3px}
.text{font-size:14px;color:#222;line-height:1.25;white-space:pre-wrap}
body.dark .text{color:#f1f1f1}
.time{font-size:10px;color:#777;margin-top:2px;text-align:right}
body.dark .time{color:#bbb}

.reply-box{background:rgba(0,0,0,.06);border-left:4px solid #009879;padding:6px 8px;border-radius:7px;margin-bottom:5px;font-size:12px}
.reply-name{font-weight:bold;color:#007765}
.reply-text{color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:210px}
body.dark .reply-text{color:#ccc}

.message-actions{display:none;gap:5px;margin-top:5px;justify-content:flex-end;flex-wrap:wrap}
.message:active .message-actions,.message:hover .message-actions{display:flex}
.action-btn{background:rgba(0,150,120,.12);color:#007765;padding:4px 7px;border-radius:8px;font-size:10px;font-weight:bold}
.delete-btn,.ban-btn{background:#ff4d4d;color:white}

.typing{display:none;position:fixed;bottom:118px;left:12px;background:rgba(255,255,255,.95);color:#555;font-size:12px;padding:7px 12px;border-radius:15px;z-index:6}
body.dark .typing{background:#202c33;color:#ddd}

.reply-preview{display:none;position:fixed;bottom:72px;left:0;width:100%;background:#f1f1f1;padding:8px 12px;border-top:1px solid #ddd;z-index:5}
body.dark .reply-preview{background:#111b21;border-top-color:#333;color:white}
.reply-preview-content{background:white;border-left:4px solid #009879;padding:8px;border-radius:10px;font-size:13px;position:relative}
body.dark .reply-preview-content{background:#202c33}
.cancel-reply{position:absolute;right:8px;top:8px;background:#ddd;border-radius:50%;width:22px;height:22px;font-weight:bold}

.input-area{position:fixed;bottom:0;left:0;width:100%;background:#f0f2f5;padding:10px;display:flex;gap:8px;align-items:center;box-shadow:0 -2px 6px rgba(0,0,0,.08);z-index:4}
body.dark .input-area{background:#202c33}
.input-area input{width:100%;border-radius:25px;background:white;border:none;padding:15px;font-size:15px}
body.dark .input-area input{background:#2a3942;color:white}
.send-btn{min-width:52px;height:52px;border-radius:50%;background:#00856f;color:white;font-size:24px;font-weight:bold}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:20;align-items:center;justify-content:center;padding:20px}
.modal-content{background:white;width:100%;max-width:420px;border-radius:20px;padding:20px}
body.dark .modal-content{background:#202c33;color:white}
.modal-content input{width:100%;padding:13px;border-radius:12px;border:1px solid #ddd;margin:6px 0}
.admin-action{width:100%;padding:12px;border-radius:12px;margin-top:8px;background:#075e54;color:white;font-weight:bold}
.close-btn{background:#ff4d4d;color:white;padding:10px 12px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>Fórmula APK</h1>
    <p class="warning">⚠️ Seja respeitoso. Spam, ofensas ou abuso podem causar banimento.</p>
    <input type="text" id="nameInput" placeholder="Seu apelido..." />
    <input type="text" id="avatarInput" placeholder="Link da foto/avatar opcional..." />
    <button class="enter-btn" onclick="enterChat()">ENTRAR NO CHAT</button>
  </div>
</div>

<div class="chat-screen" id="chatScreen">
  <div class="chat-header">
    <div class="avatar" id="userAvatar">APK</div>
    <div class="header-info">
      <div class="header-title">Chat Global Premium</div>
      <div class="live" id="onlineStatus">● LIVE</div>
    </div>
    <div class="header-actions">
      <button class="small-btn" onclick="toggleTheme()">🌙</button>
      <button class="small-btn" onclick="openAdmin()">ADM</button>
      <button class="small-btn" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>
  <div class="typing" id="typingBox">digitando...</div>

  <div class="reply-preview" id="replyPreview">
    <div class="reply-preview-content">
      <button class="cancel-reply" onclick="cancelReply()">×</button>
      <strong id="replyPreviewName"></strong>
      <div id="replyPreviewText"></div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Mensagem..." maxlength="300" />
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div class="modal" id="adminModal">
  <div class="modal-content">
    <h2>Painel ADM</h2>
    <input type="password" id="adminPass" placeholder="Senha ADM">
    <button class="admin-action" onclick="loginAdmin()">Entrar como ADM</button>
    <input type="text" id="banNameInput" placeholder="Apelido para banir">
    <button class="admin-action" onclick="banByName()">Banir apelido</button>
    <button class="admin-action" onclick="clearChat()">Limpar chat</button>
    <button class="close-btn" onclick="closeAdmin()">Fechar</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot,
  limit, deleteDoc, doc, getDocs, updateDoc, setDoc, getDoc, arrayUnion
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyOdEV7GfcOqVCYLlp8LMD_0Y8Y6HTTJg",
  authDomain: "chat-global-665c0.firebaseapp.com",
  projectId: "chat-global-665c0",
  storageBucket: "chat-global-665c0.firebasestorage.app",
  messagingSenderId: "484426308227",
  appId: "1:484426308227:web:6a8f95b90eb61a97d3d9b6",
  measurementId: "G-LCJNC6B8MW"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_PASSWORD = "123456";

let isAdmin = localStorage.getItem("isAdmin") === "true";
let userName = localStorage.getItem("chatName") || "";
let userAvatarUrl = localStorage.getItem("chatAvatar") || "";
let userId = localStorage.getItem("chatUserId") || generateUserId();

function generateUserId() {
  return "user_" + Date.now() + "_" + Math.random().toString(36).substring(2, 12);
}
let lastMessageTime = 0;
let lastSnapshotSize = 0;
let replyingTo = null;
let typingTimer = null;
let longPressTimer = null;

localStorage.setItem("chatUserId", userId);

const loginScreen = document.getElementById("loginScreen");
const chatScreen = document.getElementById("chatScreen");
const messagesBox = document.getElementById("messages");
const messageInput = document.getElementById("messageInput");
const onlineStatus = document.getElementById("onlineStatus");
const userAvatar = document.getElementById("userAvatar");
const typingBox = document.getElementById("typingBox");

const replyPreview = document.getElementById("replyPreview");
const replyPreviewName = document.getElementById("replyPreviewName");
const replyPreviewText = document.getElementById("replyPreviewText");

const forbiddenWords = ["palavrão1", "palavrão2", "spam"];

if (localStorage.getItem("theme") === "dark") document.body.classList.add("dark");

if (userName) startApp();

async function startApp() {
  const banned = await checkBan();
  if (banned) {
    alert("Você está banido deste chat.");
    localStorage.removeItem("chatName");
    location.reload();
    return;
  }

  loginScreen.style.display = "none";
  chatScreen.style.display = "flex";
  setOnlineStatus();
  setAvatar();
  setUserOnline(true);
  listenTyping();
  listenOnlineUsers();
  loadMessages();
}

function cleanText(text) {
  let newText = text;
  forbiddenWords.forEach(word => {
    const regex = new RegExp(word, "gi");
    newText = newText.replace(regex, "***");
  });
  return newText;
}

function normalizeName(name) {
  return name.trim().toLowerCase();
}

async function checkBan() {
  const deviceBan = await getDoc(doc(db, "bans", "device_" + userId));
  const nameBan = await getDoc(doc(db, "bans", "name_" + normalizeName(userName)));
  return deviceBan.exists() || nameBan.exists();
}

function setAvatar() {
  if (userAvatarUrl) {
    userAvatar.innerHTML = `<img src="${userAvatarUrl}" alt="avatar">`;
  } else {
    const letters = userName.split(" ").map(p => p[0]).join("").substring(0,2).toUpperCase();
    userAvatar.textContent = letters || "APK";
  }
}

function makeAvatar(name, avatar) {
  const av = document.createElement("div");
  av.className = "msg-avatar";

  if (avatar) {
    const img = document.createElement("img");
    img.src = avatar;
    av.appendChild(img);
  } else {
    av.textContent = (name || "U").substring(0,2).toUpperCase();
  }

  return av;
}

function setOnlineStatus() {
  onlineStatus.textContent = "● online — " + userName;
}

async function setUserOnline(status) {
  if (!userName) return;

  await setDoc(doc(db, "onlineUsers", userId), {
    name: userName,
    avatar: userAvatarUrl,
    online: status,
    lastSeen: serverTimestamp()
  });
}

function listenOnlineUsers() {
  onSnapshot(collection(db, "onlineUsers"), snapshot => {
    let count = 0;
    snapshot.forEach(item => {
      if (item.data().online) count++;
    });
    onlineStatus.textContent = `● ${count} online — ${userName}`;
  });
}

async function setTyping(isTyping) {
  if (!userName) return;

  await setDoc(doc(db, "typingUsers", userId), {
    name: userName,
    typing: isTyping,
    updatedAt: serverTimestamp()
  });
}

function listenTyping() {
  onSnapshot(collection(db, "typingUsers"), snapshot => {
    let typingNames = [];

    snapshot.forEach(item => {
      const data = item.data();
      if (item.id !== userId && data.typing) typingNames.push(data.name);
    });

    if (typingNames.length > 0) {
      typingBox.style.display = "block";
      typingBox.textContent = typingNames[0] + " está digitando...";
    } else {
      typingBox.style.display = "none";
    }
  });
}

window.toggleTheme = function() {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
};

window.enterChat = async function() {
  const name = document.getElementById("nameInput").value.trim();
  const avatar = document.getElementById("avatarInput").value.trim();

  if (!name) return alert("Digite seu apelido.");
  if (name.length < 3) return alert("O apelido precisa ter pelo menos 3 letras.");
  if (name.length > 20) return alert("O apelido pode ter no máximo 20 caracteres.");

  userName = name;
  userAvatarUrl = avatar;

  localStorage.setItem("chatName", userName);
  localStorage.setItem("chatAvatar", userAvatarUrl);

  const banned = await checkBan();
  if (banned) {
    alert("Você está banido deste chat.");
    localStorage.removeItem("chatName");
    return;
  }

  await addDoc(collection(db, "messages"), {
    name: "Sistema",
    text: userName + " entrou no chat.",
    type: "system",
    createdAt: serverTimestamp()
  });

  startApp();
};

window.logout = async function() {
  await setUserOnline(false);
  await setTyping(false);
  localStorage.removeItem("chatName");
  localStorage.removeItem("isAdmin");
  location.reload();
};

window.openAdmin = function() {
  document.getElementById("adminModal").style.display = "flex";
};

window.closeAdmin = function() {
  document.getElementById("adminModal").style.display = "none";
};

window.loginAdmin = function() {
  const pass = document.getElementById("adminPass").value;

  if (pass === ADMIN_PASSWORD) {
    isAdmin = true;
    localStorage.setItem("isAdmin", "true");
    alert("ADM ativado.");
  } else {
    alert("Senha incorreta.");
  }
};

window.banByName = async function() {
  if (!isAdmin) return alert("Entre como ADM primeiro.");

  const name = document.getElementById("banNameInput").value.trim();
  if (!name) return alert("Digite um apelido.");

  await setDoc(doc(db, "bans", "name_" + normalizeName(name)), {
    type: "name",
    name: name,
    createdAt: serverTimestamp()
  });

  alert("Apelido banido.");
};

window.banUser = async function(targetName, targetId) {
  if (!isAdmin) return alert("Apenas ADM pode banir.");

  const confirmBan = confirm("Banir " + targetName + "?");
  if (!confirmBan) return;

  await setDoc(doc(db, "bans", "name_" + normalizeName(targetName)), {
    type: "name",
    name: targetName,
    createdAt: serverTimestamp()
  });

  if (targetId) {
    await setDoc(doc(db, "bans", "device_" + targetId), {
      type: "device",
      userId: targetId,
      name: targetName,
      createdAt: serverTimestamp()
    });
  }

  alert("Usuário banido por apelido/dispositivo.");
};

window.clearChat = async function() {
  if (!isAdmin) return alert("Entre como ADM primeiro.");

  if (!confirm("Apagar todas as mensagens?")) return;

  const q = query(collection(db, "messages"), limit(300));
  const snapshot = await getDocs(q);

  const deletes = [];
  snapshot.forEach(item => deletes.push(deleteDoc(doc(db, "messages", item.id))));
  await Promise.all(deletes);

  alert("Chat limpo.");
};

window.deleteMessage = async function(id) {
  if (!confirm("Apagar para todos?")) return;
  await deleteDoc(doc(db, "messages", id));
};

window.editMessage = async function(id, oldText, ownerId) {
  if (ownerId !== userId && !isAdmin) return alert("Você só pode editar suas mensagens.");

  const newText = prompt("Editar mensagem:", oldText);
  if (!newText || !newText.trim()) return;

  await updateDoc(doc(db, "messages", id), {
    text: cleanText(newText.trim()),
    edited: true
  });
};

window.startReply = function(id, name, text) {
  replyingTo = { id, name, text };
  replyPreview.style.display = "block";
  replyPreviewName.textContent = "Respondendo " + name;
  replyPreviewText.textContent = text;
  messageInput.focus();
};

window.cancelReply = function() {
  replyingTo = null;
  replyPreview.style.display = "none";
  replyPreviewName.textContent = "";
  replyPreviewText.textContent = "";
};

window.sendMessage = async function() {
  const now = Date.now();

  if (now - lastMessageTime < 1500) return alert("Espere um pouco para enviar outra mensagem.");

  let text = messageInput.value.trim();
  if (!text) return;
  if (text.length > 300) return alert("Mensagem muito grande.");

  const banned = await checkBan();
  if (banned) return alert("Você está banido.");

  text = cleanText(text);
  lastMessageTime = now;

  const messageData = {
    name: userName,
    userId: userId,
    avatar: userAvatarUrl,
    text: text,
    type: "normal",
    edited: false,
    seenBy: [userId],
    createdAt: serverTimestamp()
  };

  if (replyingTo) messageData.replyTo = replyingTo;

  await addDoc(collection(db, "messages"), messageData);

  messageInput.value = "";
  cancelReply();
  setTyping(false);
};

async function markSeen(id, msg) {
  if (msg.userId !== userId && (!msg.seenBy || !msg.seenBy.includes(userId))) {
    await updateDoc(doc(db, "messages", id), {
      seenBy: arrayUnion(userId)
    });
  }
}

function loadMessages() {
  const q = query(collection(db, "messages"), orderBy("createdAt", "asc"), limit(120));

  onSnapshot(q, snapshot => {
    messagesBox.innerHTML = "";

    const day = document.createElement("div");
    day.className = "day-label";
    day.textContent = "Hoje";
    messagesBox.appendChild(day);

    snapshot.forEach(documentItem => {
      const msg = documentItem.data();
      const id = documentItem.id;

      if (msg.type === "normal") markSeen(id, msg);

      const time = msg.createdAt?.toDate
        ? msg.createdAt.toDate().toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"})
        : "";

      if (msg.type === "system") {
        const sys = document.createElement("div");
        sys.className = "system-message";
        sys.textContent = msg.text || "";
        messagesBox.appendChild(sys);
        return;
      }

      const isMine = msg.userId === userId || msg.name === userName;

      const row = document.createElement("div");
      row.className = isMine ? "message-row mine" : "message-row other";

      if (!isMine) row.appendChild(makeAvatar(msg.name, msg.avatar));

      const div = document.createElement("div");
      div.className = isMine ? "message my-message" : "message other-message";

      let pressData = { id, name: msg.name || "Usuário", text: msg.text || "" };

      div.addEventListener("mousedown", () => {
        longPressTimer = setTimeout(() => startReply(pressData.id, pressData.name, pressData.text), 600);
      });

      div.addEventListener("mouseup", () => clearTimeout(longPressTimer));
      div.addEventListener("mouseleave", () => clearTimeout(longPressTimer));

      const nameDiv = document.createElement("div");
      nameDiv.className = "name";
      nameDiv.textContent = msg.name || "Usuário";
      div.appendChild(nameDiv);

      if (msg.replyTo) {
        const replyBox = document.createElement("div");
        replyBox.className = "reply-box";

        const replyName = document.createElement("div");
        replyName.className = "reply-name";
        replyName.textContent = msg.replyTo.name || "Usuário";

        const replyText = document.createElement("div");
        replyText.className = "reply-text";
        replyText.textContent = msg.replyTo.text || "";

        replyBox.appendChild(replyName);
        replyBox.appendChild(replyText);
        div.appendChild(replyBox);
      }

      const textDiv = document.createElement("div");
      textDiv.className = "text";
      textDiv.textContent = msg.text || "";

      const seenCount = msg.seenBy ? msg.seenBy.length : 1;
      const status = isMine ? (seenCount > 1 ? "✓✓ visto" : "✓ enviado") : "";

      const timeDiv = document.createElement("div");
      timeDiv.className = "time";
      timeDiv.textContent =
        time +
        (msg.edited ? " · editada" : "") +
        (status ? " · " + status : "");

      const actionsDiv = document.createElement("div");
      actionsDiv.className = "message-actions";

      const replyButton = document.createElement("button");
      replyButton.className = "action-btn";
      replyButton.textContent = "Responder";
      replyButton.onclick = () => startReply(id, msg.name || "Usuário", msg.text || "");

      actionsDiv.appendChild(replyButton);

      if (isMine || isAdmin) {
        const editButton = document.createElement("button");
        editButton.className = "action-btn";
        editButton.textContent = "Editar";
        editButton.onclick = () => editMessage(id, msg.text || "", msg.userId);

        const deleteButton = document.createElement("button");
        deleteButton.className = "action-btn delete-btn";
        deleteButton.textContent = "Apagar todos";
        deleteButton.onclick = () => deleteMessage(id);

        actionsDiv.appendChild(editButton);
        actionsDiv.appendChild(deleteButton);
      }

      if (isAdmin && !isMine) {
        const banButton = document.createElement("button");
        banButton.className = "action-btn ban-btn";
        banButton.textContent = "Banir";
        banButton.onclick = () => banUser(msg.name || "Usuário", msg.userId);

        actionsDiv.appendChild(banButton);
      }

      div.appendChild(textDiv);
      div.appendChild(timeDiv);
      div.appendChild(actionsDiv);

      row.appendChild(div);
      messagesBox.appendChild(row);
    });

    if (snapshot.size > lastSnapshotSize && lastSnapshotSize !== 0) {
      playNotification();
    }

    lastSnapshotSize = snapshot.size;
    messagesBox.scrollTop = messagesBox.scrollHeight;
  });
}

function playNotification() {
  try {
    const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
    audio.volume = 0.18;
    audio.play();
  } catch(e) {}
}

messageInput.addEventListener("input", () => {
  setTyping(true);

  clearTimeout(typingTimer);

  typingTimer = setTimeout(() => {
    setTyping(false);
  }, 1200);
});

messageInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    sendMessage();
  }
});

window.addEventListener("beforeunload", () => {
  setTyping(false);
  setUserOnline(false);
});
</script>
