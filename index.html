<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>CHAT BRASIL - Moderno + Privado + Visto</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --primary: #00875f;
    --primary-dark: #006b48;
    --primary-light: #25d366;
    --background: #f0f2f5;
    --surface: #ffffff;
    --text: #111b21;
    --text-light: #667781;
    --border: #e2e8f0;
    --sent-bubble: #d9fdd3;
    --received-bubble: #ffffff;
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
    --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
    --transition: all 0.2s ease;
    --sidebar-width: 360px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--background);
    color: var(--text);
    transition: var(--transition);
  }

  body.dark {
    --background: #0a1014;
    --surface: #1e2a32;
    --text: #e9edef;
    --text-light: #8696a0;
    --border: #2a3942;
    --sent-bubble: #005c4b;
    --received-bubble: #202c33;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.2); border-radius: 10px; }
  body.dark ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); }

  /* Login Screen */
  .login-screen {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: linear-gradient(145deg, var(--primary) 0%, var(--primary-dark) 100%);
  }
  .login-card {
    background: var(--surface);
    width: 100%;
    max-width: 400px;
    padding: 40px 32px;
    border-radius: 36px;
    text-align: center;
    box-shadow: var(--shadow-lg);
    animation: fadeInUp 0.5s ease;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .login-card h1 {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    font-size: 32px;
    margin-bottom: 8px;
    font-weight: 800;
  }
  .login-card .subtitle { color: var(--text-light); font-size: 13px; margin-bottom: 28px; }
  .photo-picker { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 16px; }
  .profile-photo {
    width: 100px; height: 100px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden;
    border: 3px solid var(--surface); box-shadow: var(--shadow-md);
  }
  .profile-photo:hover { transform: scale(1.05); opacity: 0.9; }
  .profile-photo img { width: 100%; height: 100%; object-fit: cover; }
  .profile-photo span { font-size: 40px; color: white; }
  .photo-btn {
    background: var(--border); border: none; padding: 8px 16px; border-radius: 30px;
    font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text); transition: var(--transition);
  }
  .photo-btn:hover { background: var(--primary); color: white; }
  .login-card input {
    width: 100%; padding: 14px 18px; border-radius: 16px; border: 1.5px solid var(--border);
    margin: 8px 0; font-size: 15px; background: var(--surface); color: var(--text);
  }
  .login-card input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0, 135, 95, 0.15); }
  .enter-btn {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white; font-weight: 600; border-radius: 16px; font-size: 16px; margin-top: 20px;
    cursor: pointer; border: none;
  }
  .error-msg { color: #ff4d4d; font-size: 12px; margin-top: 12px; display: none; }
  .file-input { display: none; }

  /* Chat Screen */
  .chat-screen { display: none; height: 100vh; flex-direction: column; background: var(--background); }
  .chat-header {
    background: var(--surface); display: flex; align-items: center; padding: 12px 20px; gap: 14px;
    box-shadow: var(--shadow-sm); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10;
  }
  .menu-toggle {
    background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text);
    display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%;
    transition: var(--transition);
  }
  .menu-toggle:hover { background: rgba(0,0,0,0.05); }
  body.dark .menu-toggle:hover { background: rgba(255,255,255,0.1); }
  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white; display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px; overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .header-info { flex: 1; }
  .header-title { font-weight: 700; font-size: 18px; }
  .header-status { font-size: 12px; color: var(--text-light); margin-top: 4px; }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: transparent; color: var(--text); font-size: 20px; padding: 10px;
    border-radius: 50%; cursor: pointer; border: none; transition: var(--transition);
  }
  .icon-btn:hover { background: rgba(0, 0, 0, 0.06); }
  body.dark .icon-btn:hover { background: rgba(255, 255, 255, 0.06); }
  .silent-mode-active { background: rgba(0, 135, 95, 0.2); border-radius: 50%; }

  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width); background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; transition: width 0.3s ease; overflow-x: hidden; flex-shrink: 0;
  }
  .sidebar.collapsed { width: 0; min-width: 0; border-right: none; }
  .sidebar-header {
    background: var(--surface); padding: 12px 16px; display: flex; justify-content: space-between;
    align-items: center; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  .user-card { display: flex; align-items: center; gap: 12px; }
  .user-avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px;
    overflow: hidden; flex-shrink: 0;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-info { flex: 1; min-width: 0; }
  .user-info input {
    background: var(--background); border: none; padding: 6px 12px; border-radius: 20px;
    width: 100%; color: var(--text);
  }
  .edit-photo-btn {
    background: var(--border); border: none; font-size: 11px; padding: 4px 8px;
    border-radius: 12px; cursor: pointer; margin-top: 4px;
  }
  .nav-tabs {
    display: flex; padding: 8px 16px 0; gap: 8px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tab-btn {
    flex: 1; text-align: center; padding: 10px 0; font-size: 14px; font-weight: 600;
    color: var(--text-light); cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s;
  }
  .tab-btn.active { color: var(--primary-dark); border-bottom-color: var(--primary-dark); }
  .search-area { padding: 10px 12px; background: var(--surface); }
  .search-area input {
    width: 100%; padding: 10px 14px; border-radius: 30px; border: none;
    background: var(--background); color: var(--text); outline: none;
  }
  .chat-list { flex: 1; overflow-y: auto; }
  .chat-item {
    display: flex; gap: 12px; align-items: center; padding: 14px;
    cursor: pointer; border-bottom: 1px solid var(--border); transition: 0.2s;
  }
  .chat-item:hover, .chat-item.active { background: var(--background); }
  .chat-avatar {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    display: flex; align-items: center; justify-content: center; color: white;
    font-weight: bold; font-size: 18px; overflow: hidden; flex-shrink: 0;
  }
  .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .chat-details { flex: 1; min-width: 0; }
  .chat-top-line { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .chat-top-line h4 { color: var(--text); font-size: 15px; font-weight: 600; }
  .chat-top-line span { color: var(--text-light); font-size: 12px; }
  .chat-preview { display: flex; justify-content: space-between; gap: 8px; }
  .chat-preview p { color: var(--text-light); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .badge { background: var(--primary); color: white; border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: bold; }

  /* Área de mensagens */
  .main { flex: 1; display: flex; flex-direction: column; background: var(--surface); }
  .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
  .message {
    max-width: 75%; padding: 10px 14px 18px; border-radius: 12px;
    position: relative; font-size: 14px; line-height: 1.45; animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  .message.received { background: var(--received-bubble); color: var(--text); align-self: flex-start; border-top-left-radius: 4px; }
  .message.sent { background: var(--sent-bubble); color: var(--text); align-self: flex-end; border-top-right-radius: 4px; }
  .sender-name { font-size: 12px; color: var(--primary-light); margin-bottom: 4px; font-weight: bold; }
  .message-footer {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 4px;
    margin-top: 4px;
  }
  .message-time { font-size: 10px; color: var(--text-light); }
  .message-status {
    font-size: 12px;
    font-weight: normal;
    margin-left: 4px;
  }
  .status-sent { color: var(--text-light); }
  .status-delivered { color: var(--text-light); }
  .status-read { color: #53bdeb; } /* azul */
  body.dark .status-read { color: #53bdeb; }

  .input-area {
    background: var(--surface); padding: 12px 16px; display: flex; gap: 12px;
    align-items: center; border-top: 1px solid var(--border);
  }
  .input-wrapper { flex: 1; background: var(--background); border-radius: 28px; padding: 10px 18px; }
  .input-wrapper input { width: 100%; background: transparent; border: none; outline: none; color: var(--text); font-size: 15px; }
  .send-btn {
    background: var(--primary); border: none; width: 48px; height: 48px; border-radius: 50%;
    font-size: 20px; cursor: pointer; color: white; transition: 0.2s;
  }
  .send-btn:hover { transform: scale(1.05); background: #20b859; }
  .system-message {
    width: fit-content; max-width: 80%; margin: 8px auto; background: rgba(0,0,0,0.05);
    color: var(--text-light); padding: 6px 16px; border-radius: 20px; font-size: 11px; text-align: center;
  }
  .typing { display: none; position: fixed; bottom: 80px; left: 16px; background: var(--surface); color: var(--text-light); font-size: 12px; padding: 8px 16px; border-radius: 20px; z-index: 6; box-shadow: var(--shadow-sm); }
  .reply-preview { display: none; position: fixed; bottom: 76px; left: 0; right: 0; background: var(--surface); padding: 10px 16px; border-top: 1px solid var(--border); z-index: 5; }
  .reply-preview-content { background: var(--surface); border-left: 3px solid var(--primary); padding: 10px 12px; border-radius: 14px; font-size: 12px; position: relative; }
  .cancel-reply { position: absolute; right: 8px; top: 8px; background: var(--border); border: none; border-radius: 50%; width: 24px; height: 24px; font-weight: bold; cursor: pointer; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 20; align-items: center; justify-content: center; padding: 20px; }
  .modal-content { background: var(--surface); width: 100%; max-width: 400px; border-radius: 28px; padding: 28px; }
  .modal-content h2, .modal-content h3 { margin-bottom: 16px; }
  .modal-content input { width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid var(--border); margin-bottom: 16px; background: var(--background); color: var(--text); }
  .modal-content button { width: 100%; padding: 14px; border-radius: 14px; margin-top: 8px; font-weight: 600; cursor: pointer; border: none; background: var(--primary); color: white; }
  .close-btn { background: var(--border); color: var(--text); }
  .admin-action { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
  .pinned-message-bar { background: var(--primary); color: white; padding: 10px 16px; font-size: 12px; text-align: center; display: flex; justify-content: space-between; align-items: center; z-index: 9; position: sticky; top: 72px; }
  .connection-status { position: fixed; bottom: 20px; right: 20px; background: #ff4d4d; color: white; padding: 6px 12px; border-radius: 20px; font-size: 11px; z-index: 15; display: none; }
  .retry-btn { background: var(--primary); border: none; color: white; padding: 4px 12px; border-radius: 20px; cursor: pointer; margin-left: 10px; }
  .toast-notification {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--primary);
    color: white; padding: 8px 16px; border-radius: 30px; font-size: 12px; z-index: 100;
    animation: fadeInOut 2s ease;
  }
  @keyframes fadeInOut {
    0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
    15% { opacity: 1; transform: translateX(-50%) translateY(0); }
    85% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
  }

  @media (max-width: 700px) {
    .sidebar {
      position: absolute; left: 0; top: 0; height: 100%; z-index: 20;
      transition: transform 0.3s ease; width: var(--sidebar-width);
      transform: translateX(-100%);
    }
    .sidebar:not(.collapsed) { transform: translateX(0); }
    .sidebar.collapsed { transform: translateX(-100%); width: var(--sidebar-width); }
    .menu-toggle { display: block; }
  }
  @media (min-width: 701px) { .menu-toggle { display: none; } }
</style>
</head>

function showToast(msg, isError = false) {
  const toast = document.createElement("div");
  toast.className = "toast-notification";
  toast.textContent = msg;
  toast.style.background = isError ? "#ff4d4d" : "var(--primary)";

function atualizarIconeModoSilencioso() {

function resizeImage(base64, maxWidth = 80, maxHeight = 80, quality = 0.4) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let width = img.width, height = img.height;
      if (width > height) {
        if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
      } else {
        if (height > maxHeight) { width = (width * maxHeight) / height; height = maxHeight; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = base64;
  });
}

function toggleSidebar() {
  if (window.innerWidth <= 700) {
    if (sidebar.classList.contains("collapsed")) {
      sidebar.classList.remove("collapsed");
      sidebar.style.transform = "translateX(0)";
    } else {
      sidebar.classList.add("collapsed");
      sidebar.style.transform = "translateX(-100%)";
    }
  } else {
    sidebar.classList.toggle("collapsed");
  }
}
toggleSidebarBtn.addEventListener("click", toggleSidebar);
function autoCloseSidebar() {
  if (window.innerWidth <= 700) {
    sidebar.classList.add("collapsed");
    sidebar.style.transform = "translateX(-100%)";
  } else {
    sidebar.classList.add("collapsed");
  }
}

async function initFirebase() {
  try {
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    firebaseConnected = true;
    console.log("✅ Firebase conectado");
    connectionStatusDiv.style.display = "none";
    const savedUser = localStorage.getItem("chatUser");
    if (savedUser) {
      currentUser = JSON.parse(savedUser);
      await startApp();
    }
  } catch (error) {
    console.error("Erro Firebase:", error);
    firebaseConnected = false;
    connectionStatusDiv.style.display = "block";
  }
}

async function startApp() {
  if (!firebaseConnected || !currentUser) return;
  loginScreen.style.display = "none";
  chatScreen.style.display = "flex";
  userAvatar.innerHTML = currentUser.avatar ? `<img src="${currentUser.avatar}">` : currentUser.name.charAt(0).toUpperCase();
  nicknameInput.value = currentUser.name;
  myAvatar.innerHTML = currentUser.avatar ? `<img src="${currentUser.avatar}">` : currentUser.name.charAt(0).toUpperCase();
  onlineStatus.textContent = `● ${currentUser.name}`;
  await setDoc(doc(db, "onlineUsers", currentUser.id), {
    name: currentUser.name, avatar: currentUser.avatar, online: true, lastSeen: serverTimestamp()
  });
  setupTabs();
  await loadGlobalChat();
  loadPrivateChatsList();
  listenTyping();
  listenOnlineUsers();
}

function setupTabs() {
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentMode = btn.dataset.tab;
      if (currentMode === "global") {
        currentChatId = null;
        loadGlobalChat();
        renderGlobalChatList();
      } else {
        currentChatId = null;
        renderPrivateChatList();
      }
      autoCloseSidebar();
    });
  });
  searchInput.addEventListener("input", () => {
    if (currentMode === "global") renderGlobalChatList();
    else renderPrivateChatList();
  });
}

// ================= CHAT GLOBAL (sem alterações) =================
function loadGlobalChat() {
  if (globalMessagesUnsubscribe) globalMessagesUnsubscribe();
  const q = query(collection(db, "messages"), orderBy("createdAt", "asc"), limit(200));
  globalMessagesUnsubscribe = onSnapshot(q, (snapshot) => {
    if (currentMode !== "global") return;
    const wasAtBottom = messagesArea.scrollHeight - messagesArea.scrollTop <= messagesArea.clientHeight + 100;
    messagesArea.innerHTML = "";
    snapshot.forEach(docSnap => {
      const msg = docSnap.data();
      const time = msg.createdAt?.toDate ? msg.createdAt.toDate().toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"}) : "";
      if (msg.type === "system") {
        const sys = document.createElement("div"); sys.className = "system-message"; sys.textContent = msg.text; messagesArea.appendChild(sys);
        return;
      }
      const isMine = msg.userId === currentUser.id;
      const div = document.createElement("div"); div.className = `message ${isMine ? "sent" : "received"}`;
      if (!isMine && msg.name) { const sender = document.createElement("div"); sender.className = "sender-name"; sender.textContent = msg.name; div.appendChild(sender); }
      const textDiv = document.createElement("div"); textDiv.className = "message-text"; textDiv.textContent = msg.text;
      const timeDiv = document.createElement("div"); timeDiv.className = "message-time"; timeDiv.textContent = time;
      div.appendChild(textDiv); div.appendChild(timeDiv);
      messagesArea.appendChild(div);
    });
    if (wasAtBottom) messagesArea.scrollTop = messagesArea.scrollHeight;
    inputArea.style.display = "flex";
    document.querySelector(".header-title").innerHTML = "Chat Global";
    document.querySelector(".header-status").innerHTML = "Conversa pública";
  });
}
function renderGlobalChatList() {
  chatListDiv.innerHTML = `<div class="chat-item active" data-id="global">
    <div class="chat-avatar">🌍</div>
    <div class="chat-details">
      <div class="chat-top-line"><h4>Chat Global</h4><span>agora</span></div>
      <div class="chat-preview"><p>Conversa pública com todos</p></div>
    </div>
  </div>`;
  document.querySelector(".chat-item")?.addEventListener("click", () => {
    currentChatId = null; currentMode = "global";
    document.querySelectorAll(".tab-btn").forEach(b => { if(b.dataset.tab === "global") b.classList.add("active"); else b.classList.remove("active"); });
    loadGlobalChat();
    autoCloseSidebar();
  });
}

// ================= CHAT PRIVADO COM SISTEMA DE VISTO =================
async function loadPrivateChatsList() {
  const chatsRef = collection(db, "privateChats");
  const q = query(chatsRef, where("participants", "array-contains", currentUser.id));
  if (unsubscribePrivateChats) unsubscribePrivateChats();
  unsubscribePrivateChats = onSnapshot(q, () => {
    if (currentMode === "private") renderPrivateChatList();
  });
}
async function renderPrivateChatList() {
  const searchTerm = searchInput.value.toLowerCase();
  const chatsRef = collection(db, "privateChats");
  const q = query(chatsRef, where("participants", "array-contains", currentUser.id));
  const snapshot = await getDocs(q);
  let chats = [];
  for (const docSnap of snapshot.docs) {
    const data = docSnap.data();
    const otherId = data.participants.find(p => p !== currentUser.id);
    let otherName = otherId;
    let otherAvatar = "";
    const userDoc = await getDoc(doc(db, "users", otherId));
    if (userDoc.exists()) { otherName = userDoc.data().name; otherAvatar = userDoc.data().avatar; }
    if (!searchTerm || otherName.toLowerCase().includes(searchTerm)) {
      chats.push({ id: docSnap.id, name: otherName, avatar: otherAvatar, lastMessage: data.lastMessage || "", lastTime: data.lastTime || "", unread: data.unread?.[currentUser.id] || 0 });
    }
  }
  chatListDiv.innerHTML = chats.map(chat => `
    <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" data-id="${chat.id}">
      <div class="chat-avatar">${chat.avatar ? `<img src="${chat.avatar}">` : chat.name.charAt(0).toUpperCase()}</div>
      <div class="chat-details">
        <div class="chat-top-line"><h4>${chat.name}</h4><span>${chat.lastTime || ""}</span></div>
        <div class="chat-preview"><p>${chat.lastMessage || "Nova conversa"}</p>${chat.unread ? `<div class="badge">${chat.unread}</div>` : ""}</div>
      </div>
    </div>
  `).join("");
  const addBtn = document.createElement("div");
  addBtn.className = "chat-item";
  addBtn.style.justifyContent = "center";
  addBtn.style.color = "var(--primary)";
  addBtn.innerHTML = "➕ Nova conversa privada";
  addBtn.onclick = () => window.openPrivateModal();
  chatListDiv.appendChild(addBtn);
  document.querySelectorAll(".chat-item[data-id]").forEach(el => {
    el.addEventListener("click", () => {
      selectPrivateChat(el.dataset.id);
      autoCloseSidebar();
    });
  });
}
async function selectPrivateChat(chatId) {
  currentChatId = chatId;
  currentMode = "private";
  document.querySelectorAll(".tab-btn").forEach(b => { if(b.dataset.tab === "private") b.classList.add("active"); else b.classList.remove("active"); });
  const chatDoc = await getDoc(doc(db, "privateChats", chatId));
  if (!chatDoc.exists()) return;
  const data = chatDoc.data();
  const otherId = data.participants.find(p => p !== currentUser.id);
  const userDoc = await getDoc(doc(db, "users", otherId));
  const otherName = userDoc.exists() ? userDoc.data().name : otherId;
  document.querySelector(".header-title").innerHTML = otherName;
  document.querySelector(".header-status").innerHTML = "Conversa privada";
  inputArea.style.display = "flex";
  if (unsubscribeMessages) unsubscribeMessages();
  const messagesRef = collection(db, "privateChats", chatId, "messages");
  const qMsg = query(messagesRef, orderBy("timestamp", "asc"));
  unsubscribeMessages = onSnapshot(qMsg, async (snapshot) => {
    const wasAtBottom = messagesArea.scrollHeight - messagesArea.scrollTop <= messagesArea.clientHeight + 100;
    messagesArea.innerHTML = "";
    // Marcar mensagens como lidas ao abrir a conversa
    const updates = [];
    snapshot.forEach(docMsg => {
      const msg = docMsg.data();
      if (msg.senderId !== currentUser.id && (!msg.readBy || !msg.readBy.includes(currentUser.id))) {
        updates.push(updateDoc(doc(db, "privateChats", chatId, "messages", docMsg.id), {
          status: "read",
          readBy: arrayUnion(currentUser.id)
        }));
      }
    });
    if (updates.length) await Promise.all(updates);
    // Atualizar contagem de não lidas do chat
    await updateDoc(doc(db, "privateChats", chatId), { [`unread.${currentUser.id}`]: 0 });
    // Renderizar mensagens
    snapshot.forEach(docMsg => {
      const msg = docMsg.data();
      const time = msg.timestamp?.toDate ? msg.timestamp.toDate().toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"}) : "";
      const isMine = msg.senderId === currentUser.id;
      const div = document.createElement("div"); div.className = `message ${isMine ? "sent" : "received"}`;
      if (!isMine && msg.senderName) { const sender = document.createElement("div"); sender.className = "sender-name"; sender.textContent = msg.senderName; div.appendChild(sender); }
      const textDiv = document.createElement("div"); textDiv.className = "message-text"; textDiv.textContent = msg.text;
      const footer = document.createElement("div"); footer.className = "message-footer";
      const timeSpan = document.createElement("span"); timeSpan.className = "message-time"; timeSpan.textContent = time;
      footer.appendChild(timeSpan);
      if (isMine) {
        const statusSpan = document.createElement("span"); statusSpan.className = "message-status";
        let statusIcon = "✓";
        let statusClass = "status-sent";
        if (msg.status === "delivered") { statusIcon = "✓✓"; statusClass = "status-delivered"; }
        else if (msg.status === "read") { statusIcon = "✓✓"; statusClass = "status-read"; }
        else { statusIcon = "✓"; statusClass = "status-sent"; }
        statusSpan.innerHTML = statusIcon;
        statusSpan.className = `message-status ${statusClass}`;
        footer.appendChild(statusSpan);
      }
      div.appendChild(textDiv);
      div.appendChild(footer);
      messagesArea.appendChild(div);
    });
    if (wasAtBottom) messagesArea.scrollTop = messagesArea.scrollHeight;
    // marcar mensagens como entregues (delivered) se for o destinatário e ainda não foi
    snapshot.forEach(docMsg => {
      const msg = docMsg.data();
      if (msg.senderId !== currentUser.id && (!msg.status || msg.status === "sent")) {
        updateDoc(doc(db, "privateChats", chatId, "messages", docMsg.id), {
          status: "delivered"
        });
      }
    });
  });
}
window.sendMessage = async function() {
  if (currentMode === "global") {
    let text = messageInput.value.trim();
    if (!text) return;
    const messageData = { name: currentUser.name, userId: currentUser.id, text: text, type: "normal", createdAt: serverTimestamp() };
    if (currentUser.avatar && currentUser.avatar.length < 50000) messageData.avatar = currentUser.avatar;
    if (replyingTo) messageData.replyTo = replyingTo;
    await addDoc(collection(db, "messages"), messageData);
    messageInput.value = ""; cancelReply();
  } else if (currentMode === "private" && currentChatId) {
    let text = messageInput.value.trim();
    if (!text) return;
    const chatRef = doc(db, "privateChats", currentChatId);
    const messagesRef = collection(chatRef, "messages");
    await addDoc(messagesRef, {
      text: text,
      senderId: currentUser.id,
      senderName: currentUser.name,
      timestamp: serverTimestamp(),
      status: "sent",
      readBy: [currentUser.id]
    });
    await updateDoc(chatRef, {
      lastMessage: text,
      lastTime: new Date().toLocaleTimeString(),
      [`unread.${currentUser.id}`]: 0,
      [`unread.${currentChatId.split('_')[1]}`]: incrementUnread? true : false // será atualizado pelo listener
    });
    // Incrementar contagem de não lidas para o destinatário
    const chatData = (await getDoc(chatRef)).data();
    const otherId = chatData.participants.find(p => p !== currentUser.id);
    await updateDoc(chatRef, {
      [`unread.${otherId}`]: (chatData.unread?.[otherId] || 0) + 1
    });
    messageInput.value = ""; cancelReply();
  }
};

function incrementUnread(chatId, userId) {
  // função auxiliar
}

window.openPrivateModal = function() { document.getElementById("newPrivateModal").style.display = "flex"; };
window.closePrivateModal = function() { document.getElementById("newPrivateModal").style.display = "none"; };
window.createPrivateChat = async function() {
  const contactName = document.getElementById("privateContactName").value.trim();
  if (!contactName) return alert("Digite o nome do contato");
  const usersRef = collection(db, "users");
  const qUsers = query(usersRef, where("name", "==", contactName));
  const snap = await getDocs(qUsers);
  let contactId = null;
  if (snap.empty) {
    contactId = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2,6);
    await setDoc(doc(db, "users", contactId), { name: contactName, avatar: "", createdAt: serverTimestamp() });
  } else {
    contactId = snap.docs[0].id;
  }
  const chatsRef = collection(db, "privateChats");
  const existing = await getDocs(query(chatsRef, where("participants", "array-contains", currentUser.id)));
  let already = false;
  existing.forEach(d => { if (d.data().participants.includes(contactId)) already = true; });
  if (already) { alert("Você já tem uma conversa com esse contato!"); closePrivateModal(); return; }
  const chatId = `priv_${Date.now()}`;
  await setDoc(doc(db, "privateChats", chatId), {
    participants: [currentUser.id, contactId],
    createdAt: serverTimestamp(),
    unread: { [currentUser.id]: 0, [contactId]: 0 }
  });
  closePrivateModal();
  showToast("Conversa criada! Selecione na aba Privado.");
  if (currentMode !== "private") document.querySelector(".tab-btn[data-tab='private']").click();
  await loadPrivateChatsList();
};

window.toggleTheme = function() { document.body.classList.toggle("dark"); localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light"); };
window.toggleSilentMode = function() { modoSilencioso = !modoSilencioso; localStorage.setItem("modoSilencioso", modoSilencioso); atualizarIconeModoSilencioso(); alert(modoSilencioso ? "🔇 Modo silencioso ativado" : "🔔 Modo normal ativado"); };
window.changePhoto = function() { const input = document.createElement("input"); input.type = "file"; input.accept = "image/*"; input.onchange = async (e) => { const file = e.target.files[0]; if(file){ const reader = new FileReader(); reader.onload = async (ev) => { const opt = await resizeImage(ev.target.result); currentUser.avatar = opt; localStorage.setItem("chatUser", JSON.stringify(currentUser)); myAvatar.innerHTML = `<img src="${opt}">`; userAvatar.innerHTML = `<img src="${opt}">`; }; reader.readAsDataURL(file); } }; input.click(); };
nicknameInput.addEventListener("change", () => { if (nicknameInput.value.trim()) { currentUser.name = nicknameInput.value.trim(); localStorage.setItem("chatUser", JSON.stringify(currentUser)); onlineStatus.textContent = `● ${currentUser.name}`; } });
window.cancelReply = function() { replyingTo = null; replyPreview.style.display = "none"; };
window.startReply = function(id, name, text) { replyingTo = { id, name, text }; replyPreview.style.display = "block"; replyPreviewName.textContent = "Respondendo " + name; replyPreviewText.textContent = text; messageInput.focus(); };
window.enterChat = async function() { const name = document.getElementById("nameInput").value.trim(); if (!name) { document.getElementById("loginError").textContent = "Digite seu apelido!"; document.getElementById("loginError").style.display = "block"; return; } if (name.length < 3) { document.getElementById("loginError").textContent = "Mínimo 3 letras!"; return; } const avatarBase64 = window.selectedPhotoBase64 || ""; currentUser = { id: "user_" + Date.now() + "_" + Math.random().toString(36).substr(2,6), name: name, avatar: avatarBase64 }; localStorage.setItem("chatUser", JSON.stringify(currentUser)); await setDoc(doc(db, "users", currentUser.id), { name: currentUser.name, avatar: currentUser.avatar, createdAt: serverTimestamp() }); await addDoc(collection(db, "messages"), { name: "📢 Sistema", text: currentUser.name + " entrou no chat.", type: "system", createdAt: serverTimestamp() }); startApp(); };
window.logout = function() { localStorage.clear(); location.reload(); };
window.openAdmin = function() { document.getElementById("adminModal").style.display = "flex"; adminTools.style.display = "none"; document.getElementById("adminPass").value = ""; };
window.closeAdmin = function() { document.getElementById("adminModal").style.display = "none"; };
window.loginAdmin = function() { const pass = document.getElementById("adminPass").value; if (pass === ADMIN_PASSWORD) { isAdmin = true; adminTools.style.display = "block"; adminStatus.innerHTML = "✅ Admin logado!"; alert("Modo Admin ativado"); } else { alert("Senha incorreta"); } };
window.banByName = async function() { if (!isAdmin) return; const name = document.getElementById("banNameInput").value.trim(); if (!name) return; await setDoc(doc(db, "bans", "name_" + name.toLowerCase()), { type: "name", name: name, createdAt: serverTimestamp() }); alert("✅ Apelido banido!"); };
window.clearChat = async function() { if (!isAdmin || !confirm("Apagar TODAS as mensagens globais?")) return; const q = query(collection(db, "messages"), limit(300)); const snap = await getDocs(q); snap.forEach(d => deleteDoc(doc(db, "messages", d.id))); alert("Chat global limpo!"); };
function listenTyping() { onSnapshot(collection(db, "typingUsers"), (snap) => { let names = []; snap.forEach(d => { if(d.id !== currentUser.id && d.data().typing) names.push(d.data().name); }); if (names.length && !modoSilencioso) { typingBox.style.display = "block"; typingBox.textContent = names[0] + (names.length>1?" e outros ":"") + " digitando..."; } else typingBox.style.display = "none"; }); }
function listenOnlineUsers() { onSnapshot(collection(db, "onlineUsers"), (snap) => { let count = 0; snap.forEach(d => { if(d.data().online) count++; }); onlineStatus.textContent = `● ${count} online — ${currentUser.name}`; }); }
photoInput.addEventListener("change", async (e) => { const file = e.target.files[0]; if(file){ const reader = new FileReader(); reader.onload = async (ev) => { const opt = await resizeImage(ev.target.result); window.selectedPhotoBase64 = opt; profilePhoto.innerHTML = `<img src="${opt}">`; }; reader.readAsDataURL(file); } });
window.addEventListener("beforeunload", () => { if (currentUser) setDoc(doc(db, "onlineUsers", currentUser.id), { online: false }); });
initFirebase();
